<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Acceso Admin - Turnos YA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { "brand": "#22c55e", "surface": "#f8fafc", "dark": "#0f172a" }, fontFamily: { "sans": ["Inter", "sans-serif"] } } } }
    </script>
</head>
<body class="bg-surface font-sans text-dark antialiased h-screen flex flex-col justify-center items-center p-4">
    <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <div class="flex items-center gap-2 mb-8 justify-center">
            <div class="w-10 h-10 bg-brand text-white rounded-xl shadow-lg shadow-brand/30 flex items-center justify-center">
                <span class="material-symbols-rounded">admin_panel_settings</span>
            </div>
            <span class="text-2xl font-black tracking-tight text-gray-800">Admin</span>
        </div>
        
        <form id="login-form" class="space-y-5" onsubmit="event.preventDefault(); window.iniciarSesion();">
            <div>
                <label class="block text-xs uppercase tracking-wider font-extrabold text-gray-500 mb-1">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full border border-gray-200 rounded-xl px-4 py-3 bg-gray-50 font-semibold focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand transition-all">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider font-extrabold text-gray-500 mb-1">Contraseña</label>
                <input type="password" id="password" required class="w-full border border-gray-200 rounded-xl px-4 py-3 bg-gray-50 font-semibold focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand transition-all">
            </div>
            <button type="submit" id="btn-login" class="w-full mt-4 h-14 bg-dark text-white font-extrabold text-lg rounded-xl shadow-lg hover:bg-gray-800 active:scale-95 transition-all">
                Ingresar al Panel
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm font-bold text-gray-500 hover:text-brand transition-colors">← Volver al inicio</a>
        </div>
    </div>

    <script type="module">
        import { AuthService } from '../capaDeLogica/authService.js';
        import { UI } from './ui.js';

        // Redirigir directamente si ya está logueado
        window.addEventListener('load', async () => {
            if (await AuthService.isAuthenticated()) {
                window.location.href = 'configuracion.html';
            }
        });

        window.iniciarSesion = async () => {
            const btn = document.getElementById('btn-login');
            btn.innerHTML = "Verificando...";
            btn.disabled = true;

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            const result = await AuthService.login(email, pass);

            if (result.success) {
                window.location.href = 'configuracion.html';
            } else {
                UI.alert(result.error, 'Error de acceso', 'error');
                btn.innerHTML = "Ingresar al Panel";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
